<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDA Projects</title>
    <style>
        .header-container {
            margin-bottom: 50px;
            text-align: center;
        }

        .header-container h1 {
            font-size: 2.5rem;
            color: #1a1a1a;
            margin: 0;
            letter-spacing: -1px;
            font-weight: 700;
        }

        .header-container p {
            color: #666;
            font-size: 1.1rem;
            margin-top: 8px;
            font-weight: 300;
        }
        /* This ensures the body takes up at least the full screen height */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            background: #fdfdfd; 
            color: #333;
        }
        /* This pushes the footer to the bottom */
        main { flex: 1; text-align: center; padding: 40px 20px; }
        
        h1 { margin-bottom: 40px; font-weight: 300; }
        .container { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
        .card { background: #fff; padding: 25px; border: 1px solid #eaeaea; border-radius: 12px; width: 280px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .btn { padding: 10px; text-decoration: none; border-radius: 6px; font-size: 14px; font-weight: 500; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.8; }
        .clean { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .raw { background: #e3f2fd; color: #1565c0; border: 1px solid #bbdefb; }
        
        footer { text-align: center; padding: 20px; border-top: 1px solid #eee; }
        .gh-link { color: #555; text-decoration: none; font-size: 14px; }
    
        .card-title {
        font-size: 1.25rem;
        color: #333;
        margin: 0 0 20px 0;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        }

        /* Optional: Add a hover effect to the card for interactivity */
        .card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0,0,0,0.1);
        }    
    </style>
</head>
<body>

    <main>
        
        <div class="header-container">
            <h1>Exploratory Data Analysis</h1>
        </div>
        <div class="container">
            <div class="card">
                <h3>SALES DATA</h3>
                <div class="btn-group">
                    <a href="EDA-1/clean-report.html" class="btn clean" target="_blank" rel="noopener">Clean Report</a>
                    <a href="EDA-1/raw-report.html" class="btn raw" target="_blank" rel="noopener">Raw Report</a>
                </div>
            </div>
            <div class="card">
                <h3>SPOTIFY DATA</h3>
                <div class="btn-group">
                    <a href="EDA-2/clean-report.html" class="btn clean" target="_blank" rel="noopener">Clean Report</a>
                    <a href="EDA-2/raw-report.html" class="btn raw" target="_blank" rel="noopener">Raw Report</a>
                </div>
            </div>
            
        </div>
    </main>

    <footer>
        <a href="https://github.com/sagarmagar977/EDA" class="gh-link" target="_blank" rel="noopener">View Source on GitHub</a>
    </footer>

</body>
</html>
